<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사랑 폭발 메시지 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap');

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top left, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    font-family: 'Baloo 2', cursive;
    overflow-x: hidden;
  }

  .container {
    max-width: 800px;
    margin: 50px auto;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 40px;
    padding: 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: float 4s ease-in-out infinite alternate;
  }

  @keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-20px); }
  }

  h1 {
    font-size: 3.5rem;
    color: #ff3366;
    text-shadow: 2px 2px #fff7f7, 4px 4px #ff99aa;
    animation: glow 1.5s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 2px 2px #fff7f7, 4px 4px #ff99aa; }
    to { text-shadow: 2px 2px #ffccdd, 4px 4px #ff6699; }
  }

  h2 {
    font-size: 2rem;
    margin: 20px 0;
    color: #ff6699;
  }

  .message {
    font-size: 1.5rem;
    line-height: 2.0;
    margin: 30px 0;
  }

  .message span {
    color: #ff3366;
    font-weight: bold;
  }

  .emoji {
    font-size: 2.5rem;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(-15px); }
  }

  .decor {
    font-size: 3rem;
    margin: 20px 0;
    animation: spin 5s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .btn {
    display: inline-block;
    margin-top: 30px;
    padding: 20px 40px;
    font-size: 1.5rem;
    background: linear-gradient(45deg, #ff99cc, #ff66ff, #ffccff);
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .btn:hover {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  }

  .footnote {
    margin-top: 40px;
    font-size: 1rem;
    color: #333;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="decor">💖✨🌈🎉🍰🦄💖✨</div>
    <h1>엄마 아빠 오빠 사랑해용!! 💕</h1>
    <h2>세상에서 제일 귀엽고 사랑스러운 여러분께 💌</h2>

    <div class="message">
      🎀 <span>엄마</span> 껌딱지 딸의 끝없는 사랑과 감사 😘<br>
      🎀 <span>아빠</span> 언제나 든든한 히어로 💪🦸‍♂️<br>
      🎀 <span>오빠</span> 세상 최고 오빠라 웃음 폭발 😂🤣<br>
      🌟 여러분 덕분에 매일 행복 폭발 🌈💥<br>
      🍰 달콤한 사랑과 애정 팡팡 터트립니다 💖💖💖
    </div>

    <div class="emoji">🥰😆💃🕺🎉🍬🍭</div>

    <a href="#" class="btn">하트 폭발 받기 💌💖</a>

    <div class="footnote">
      P.S. 사랑은 무제한 공급, 웃음은 무한 반복 ♾️🤣
    </div>
  </div>
</body>
</html>
