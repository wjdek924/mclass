<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>초대장</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Pretendard',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#5f9cff,#8fd3f4);
padding:20px;
}

/* 카드 */

.container{
width:100%;
max-width:650px;

background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);

border-radius:24px;

padding:45px 30px;

box-shadow:
0 20px 50px rgba(0,0,0,0.15);

text-align:center;

animation:fadeUp 1s ease;
}

/* 제목 */

.title{
font-size:32px;
font-weight:600;
color:#333;
margin-bottom:10px;
}

.subtitle{
font-size:15px;
color:#666;
margin-bottom:35px;
}

/* 버튼 그리드 */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* 버튼 */

.btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

height:65px;

border-radius:14px;

text-decoration:none;
color:white;

font-weight:500;
font-size:16px;

transition:all .25s ease;

box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* 버튼 색 */

.btn1{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.btn2{background:linear-gradient(135deg,#667eea,#764ba2);}
.btn3{background:linear-gradient(135deg,#ff758c,#ff7eb3);}
.btn4{background:linear-gradient(135deg,#f6d365,#fda085);}
.btn5{background:linear-gradient(135deg,#43e97b,#38f9d7);}

/* 버튼 효과 */

.btn:hover{

transform:translateY(-4px) scale(1.02);

box-shadow:
0 12px 25px rgba(0,0,0,0.25);
}

.btn:active{
transform:scale(.97);
}

/* 아이콘 */

.icon{
font-size:18px;
}

/* 푸터 */

.footer{

margin-top:35px;
font-size:13px;
color:#888;
}

/* 애니메이션 */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(30px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* 모바일 */

@media(max-width:480px){

.container{
padding:35px 20px;
}

.title{
font-size:26px;
}

.grid{
grid-template-columns:1fr;
}

.btn{
height:60px;
font-size:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">✨ 초대장</div>
<div class="subtitle">아래 버튼을 눌러 페이지로 이동하세요</div>

<div class="grid">

<a class="btn btn1" href="index1.html">
<i class="fas fa-map-location-dot icon"></i>
동탄 나들이 초대장
</a>

<a class="btn btn2" href="index2.html">
<i class="fas fa-heart icon"></i>
우리가족 사랑의 메시지
</a>

<a class="btn btn3" href="index3.html">
<i class="fas fa-tree icon"></i>
벚꽃놀이 초대장
</a>

<a class="btn btn4" href="index4.html">
<i class="fas fa-plane icon"></i>
대전투어 초대장
</a>

<a class="btn btn5" href="index5.html">
<i class="fas fa-book icon"></i>
수정이 열공해라
</a>

</div>

<div class="footer">
Invitation Page • 2026
</div>

</div>

</body>
</html>
